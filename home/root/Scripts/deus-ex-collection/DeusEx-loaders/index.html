<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deus Ex: Loaders & Progress</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="hex-bg"></div>
    <div class="vignette"></div>

    <div class="container">
        <header class="main-header">
            <div class="header-accent"></div>
            <div class="logo-area">
                <div class="logo-hex">SI</div>
                <div class="logo-text">
                    <span class="logo-title">SARIF INDUSTRIES</span>
                    <span class="logo-sub">LOADING SYSTEMS</span>
                </div>
            </div>
            <div class="header-date">2027.08.23</div>
        </header>

        <section class="section">
            <div class="section-header">
                <div class="section-icon">◈</div>
                <h2 class="section-title">Progress Bars</h2>
                <div class="section-line"></div>
            </div>

            <div class="loaders-showcase">
                <div class="loader-group">
                    <label class="loader-label">DEFAULT</label>
                    <div class="progress">
                        <div class="progress-bar" style="width: 75%"></div>
                    </div>
                    <span class="progress-text">75%</span>
                </div>

                <div class="loader-group">
                    <label class="loader-label">STRIPED</label>
                    <div class="progress progress-striped">
                        <div class="progress-bar" style="width: 60%"></div>
                    </div>
                    <span class="progress-text">60%</span>
                </div>

                <div class="loader-group">
                    <label class="loader-label">ANIMATED</label>
                    <div class="progress progress-animated">
                        <div class="progress-bar"></div>
                    </div>
                    <span class="progress-text">Loading...</span>
                </div>

                <div class="loader-group">
                    <label class="loader-label">CYAN</label>
                    <div class="progress progress-cyan">
                        <div class="progress-bar" style="width: 45%"></div>
                    </div>
                    <span class="progress-text">45%</span>
                </div>

                <div class="loader-group">
                    <label class="loader-label">DANGER</label>
                    <div class="progress progress-danger">
                        <div class="progress-bar" style="width: 90%"></div>
                    </div>
                    <span class="progress-text">90%</span>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <div class="section-icon">◈</div>
                <h2 class="section-title">Spinners</h2>
                <div class="section-line"></div>
            </div>

            <div class="spinners-showcase">
                <div class="spinner-group">
                    <label class="spinner-label">DEUS EX MK</label>
                    <div class="loading" id="loading">
                        <svg id="triangle" viewBox="0 0 226 226" xmlns="http://www.w3.org/2000/svg" fill-rule="evenodd" clip-rule="evenodd" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="1.5">
                            <g class="group--1"><path class="triangle" id="triangle-1-1" d="M 22.5 180.1 l -22.5 45 h 45 z"/><path class="fill" id="fill-1-1" d="M 22.5 180.1 l -22.5 45 h 45 z"/></g>
                            <g class="group--3"><path class="triangle" id="triangle-3-1" d="M 45.07 225.099 l -22.5 -45 h 45 z"/><path class="fill" id="fill-3-1" d="M 45.07 225.099 l -22.5 -45 h 45 z"/></g>
                            <g class="group--2"><path class="triangle" id="triangle-2-1" d="M 67.6 180.1 l -22.5 45 h 45 z"/><path class="fill" id="fill-2-1" d="M 67.6 180.1 l -22.5 45 h 45 z"/></g>
                            <g class="group--4"><path class="triangle" id="triangle-4-1" d="M 90.07 225.099 l -22.5 -45 h 45 z"/><path class="fill" id="fill-4-1" d="M 90.07 225.099 l -22.5 -45 h 45 z"/></g>
                            <g class="group--5"><path class="triangle" id="triangle-5-1" d="M 112.6 180.1 l -22.5 45 h 45 z"/><path class="fill" id="fill-5-1" d="M 112.6 180.1 l -22.5 45 h 45 z"/></g>
                            <g class="group--6"><path class="triangle" id="triangle-6-1" d="M 135.07 225.099 l -22.5 -45 h 45 z"/><path class="fill" id="fill-6-1" d="M 135.07 225.099 l -22.5 -45 h 45 z"/></g>
                            <g class="group--7"><path class="triangle" id="triangle-7-1" d="M 45.07 135.1 l 22.5 45 h -45 z"/><path class="fill" id="fill-7-1" d="M 45.07 135.1 l 22.5 45 h -45 z"/></g>
                            <g class="group--8"><path class="triangle" id="triangle-8-1" d="M 157.6 180.1 l -22.5 45 h 45 z"/><path class="fill" id="fill-8-1" d="M 157.6 180.1 l -22.5 45 h 45 z"/></g>
                            <g class="group--9"><path class="triangle" id="triangle-9-1" d="M 180.07 225.099 l -22.5 -45 h 45 z"/><path class="fill" id="fill-9-1" d="M 180.07 225.099 l -22.5 -45 h 45 z"/></g>
                            <g class="group--10"><path class="triangle" id="triangle-10-1" d="M 202.6 180.1 l -22.5 45 h 45 z"/><path class="fill" id="fill-10-1" d="M 202.6 180.1 l -22.5 45 h 45 z"/></g>
                            <g class="group--11"><path class="triangle" id="triangle-11-1" d="M 67.6 180.099 l 22.5 -45 h -45 z"/><path class="fill" id="fill-11-1" d="M 67.6 180.099 l 22.5 -45 h -45 z"/></g>
                            <g class="group--12"><path class="triangle" id="triangle-12-1" d="M 180.07 135.1 l 22.5 45 h -45 z"/><path class="fill" id="fill-12-1" d="M 180.07 135.1 l 22.5 45 h -45 z"/></g>
                            <g class="group--13"><path class="triangle" id="triangle-13-1" d="M 67.6 90.1 l 22.5 45 h -45 z"/><path class="fill" id="fill-13-1" d="M 67.6 90.1 l 22.5 45 h -45 z"/></g>
                            <g class="group--14"><path class="triangle" id="triangle-14-1" d="M 157.6 180.099 l -22.5 -45 h 45 z"/><path class="fill" id="fill-14-1" d="M 157.6 180.099 l -22.5 -45 h 45 z"/></g>
                            <g class="group--15"><path class="triangle" id="triangle-15-1" d="M 157.6 90.1 l 22.5 45 h -45 z"/><path class="fill" id="fill-15-1" d="M 157.6 90.1 l 22.5 45 h -45 z"/></g>
                            <g class="group--16 group--16-1" id="group-16-1"><path class="triangle" id="triangle-16-1-1" d="M 90.07 135.099 l 22.5 -45 h -45 z"/><path class="fill fill--16" id="fill-16-1-1" d="M 90.07 135.099 l 22.5 -45 h -45 z"/></g>
                            <g class="group--16 group--16-2" id="group-16-2"><path class="triangle" id="triangle-16-2-1" d="M 135.07 135.099 l -22.5 -45 h 45 z"/><path class="fill fill--16" id="fill-16-2-1" d="M 135.07 135.099 l -22.5 -45 h 45 z"/></g>
                            <g class="group--17"><path class="triangle" id="triangle-17-1" d="M 135.07 45 l 22.5 45 h -45 z"/><path class="fill" id="fill-17-1" d="M 135.07 45 l 22.5 45 h -45 z"/></g>
                            <g class="group--18"><path class="triangle" id="triangle-18-1" d="M 90.07 45 l 22.5 45 h -45 z"/><path class="fill" id="fill-18-1" d="M 90.07 45 l 22.5 45 h -45 z"/></g>
                            <g class="group--19"><path class="triangle" id="triangle-19-1" d="M 135.07 45 h -45 l 22.5 45 z"/><path class="fill" id="fill-19-1" d="M 135.07 45 h -45 l 22.5 45 z"/></g>
                            <g class="group--20"><path class="triangle" id="triangle-20-1" d="M 112.6.1 l 22.5 45 h -45 z"/><path class="fill" id="fill-20-1" d="M 112.6.1 l 22.5 45 h -45 z"/></g>
                        </svg>
                        <svg id="triangle-2" viewBox="0 0 226 226" xmlns="http://www.w3.org/2000/svg" fill-rule="evenodd" clip-rule="evenodd" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="1.5">
                            <g class="group--1"><path class="triangle" id="triangle-1-2" d="M 22.5 180.1 l -22.5 45 h 45 z"/><path class="fill" id="fill-1-2" d="M 22.5 180.1 l -22.5 45 h 45 z"/></g>
                            <g class="group--3"><path class="triangle" id="triangle-3-2" d="M 45.07 225.099 l -22.5 -45 h 45 z"/><path class="fill" id="fill-3-2" d="M 45.07 225.099 l -22.5 -45 h 45 z"/></g>
                            <g class="group--2"><path class="triangle" id="triangle-2-2" d="M 67.6 180.1 l -22.5 45 h 45 z"/><path class="fill" id="fill-2-2" d="M 67.6 180.1 l -22.5 45 h 45 z"/></g>
                            <g class="group--4"><path class="triangle" id="triangle-4-2" d="M 90.07 225.099 l -22.5 -45 h 45 z"/><path class="fill" id="fill-4-2" d="M 90.07 225.099 l -22.5 -45 h 45 z"/></g>
                            <g class="group--5"><path class="triangle" id="triangle-5-2" d="M 112.6 180.1 l -22.5 45 h 45 z"/><path class="fill" id="fill-5-2" d="M 112.6 180.1 l -22.5 45 h 45 z"/></g>
                            <g class="group--6"><path class="triangle" id="triangle-6-2" d="M 135.07 225.099 l -22.5 -45 h 45 z"/><path class="fill" id="fill-6-2" d="M 135.07 225.099 l -22.5 -45 h 45 z"/></g>
                            <g class="group--7"><path class="triangle" id="triangle-7-2" d="M 45.07 135.1 l 22.5 45 h -45 z"/><path class="fill" id="fill-7-2" d="M 45.07 135.1 l 22.5 45 h -45 z"/></g>
                            <g class="group--8"><path class="triangle" id="triangle-8-2" d="M 157.6 180.1 l -22.5 45 h 45 z"/><path class="fill" id="fill-8-2" d="M 157.6 180.1 l -22.5 45 h 45 z"/></g>
                            <g class="group--9"><path class="triangle" id="triangle-9-2" d="M 180.07 225.099 l -22.5 -45 h 45 z"/><path class="fill" id="fill-9-2" d="M 180.07 225.099 l -22.5 -45 h 45 z"/></g>
                            <g class="group--10"><path class="triangle" id="triangle-10-2" d="M 202.6 180.1 l -22.5 45 h 45 z"/><path class="fill" id="fill-10-2" d="M 202.6 180.1 l -22.5 45 h 45 z"/></g>
                            <g class="group--11"><path class="triangle" id="triangle-11-2" d="M 67.6 180.099 l 22.5 -45 h -45 z"/><path class="fill" id="fill-11-2" d="M 67.6 180.099 l 22.5 -45 h -45 z"/></g>
                            <g class="group--12"><path class="triangle" id="triangle-12-2" d="M 180.07 135.1 l 22.5 45 h -45 z"/><path class="fill" id="fill-12-2" d="M 180.07 135.1 l 22.5 45 h -45 z"/></g>
                            <g class="group--13"><path class="triangle" id="triangle-13-2" d="M 67.6 90.1 l 22.5 45 h -45 z"/><path class="fill" id="fill-13-2" d="M 67.6 90.1 l 22.5 45 h -45 z"/></g>
                            <g class="group--14"><path class="triangle" id="triangle-14-2" d="M 157.6 180.099 l -22.5 -45 h 45 z"/><path class="fill" id="fill-14-2" d="M 157.6 180.099 l -22.5 -45 h 45 z"/></g>
                            <g class="group--15"><path class="triangle" id="triangle-15-2" d="M 157.6 90.1 l 22.5 45 h -45 z"/><path class="fill" id="fill-15-2" d="M 157.6 90.1 l 22.5 45 h -45 z"/></g>
                            <g class="group--16 group--16-1" id="group-16-1-2"><path class="triangle" id="triangle-16-1-2" d="M 90.07 135.099 l 22.5 -45 h -45 z"/><path class="fill fill--16" id="fill-16-1-2" d="M 90.07 135.099 l 22.5 -45 h -45 z"/></g>
                            <g class="group--16 group--16-2" id="group-16-2-2"><path class="triangle" id="triangle-16-2-2" d="M 135.07 135.099 l -22.5 -45 h 45 z"/><path class="fill fill--16" id="fill-16-2-2" d="M 135.07 135.099 l -22.5 -45 h 45 z"/></g>
                            <g class="group--17"><path class="triangle" id="triangle-17-2" d="M 135.07 45 l 22.5 45 h -45 z"/><path class="fill" id="fill-17-2" d="M 135.07 45 l 22.5 45 h -45 z"/></g>
                            <g class="group--18"><path class="triangle" id="triangle-18-2" d="M 90.07 45 l 22.5 45 h -45 z"/><path class="fill" id="fill-18-2" d="M 90.07 45 l 22.5 45 h -45 z"/></g>
                            <g class="group--19"><path class="triangle" id="triangle-19-2" d="M 135.07 45 h -45 l 22.5 45 z"/><path class="fill" id="fill-19-2" d="M 135.07 45 h -45 l 22.5 45 z"/></g>
                            <g class="group--20"><path class="triangle" id="triangle-20-2" d="M 112.6.1 l 22.5 45 h -45 z"/><path class="fill" id="fill-20-2" d="M 112.6.1 l 22.5 45 h -45 z"/></g>
                        </svg>
                    </div>
                </div>

                <div class="spinner-group">
                    <label class="spinner-label">DEFAULT</label>
                    <div class="spinner"></div>
                </div>

                <div class="spinner-group">
                    <label class="spinner-label">DUAL</label>
                    <div class="spinner-dual"></div>
                </div>

                <div class="spinner-group">
                    <label class="spinner-label">TRIANGLE FLARE</label>
                    <div class="spinner-triangle-flare">
                        <div class="tri-flare"></div>
                        <div class="tri-flare"></div>
                        <div class="tri-flare"></div>
                        <div class="tri-flare"></div>
                        <div class="tri-flare"></div>
                        <div class="tri-flare"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <div class="section-icon">◈</div>
                <h2 class="section-title">Skeleton Loaders</h2>
                <div class="section-line"></div>
            </div>

            <div class="skeletons-showcase">
                <div class="skeleton-group">
                    <label class="skeleton-label">TEXT LINES</label>
                    <div class="skeleton">
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line skeleton-short"></div>
                    </div>
                </div>

                <div class="skeleton-group">
                    <label class="skeleton-label">CARD</label>
                    <div class="skeleton-card">
                        <div class="skeleton-avatar"></div>
                        <div class="skeleton-content">
                            <div class="skeleton-title"></div>
                            <div class="skeleton-text"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <div class="section-icon">◈</div>
                <h2 class="section-title">Loading Text</h2>
                <div class="section-line"></div>
            </div>

            <div class="text-loaders-showcase">
                <div class="text-loader-group">
                    <label class="text-loader-label">TYPING</label>
                    <div class="typing-loader">Initializing</div>
                </div>

                <div class="text-loader-group">
                    <label class="text-loader-label">BLINKING</label>
                    <div class="blinking-loader">SYSTEM BOOT_</div>
                </div>

                <div class="text-loader-group">
                    <label class="text-loader-label">GLITCH</label>
                    <div class="glitch-loader" data-text="LOADING">LOADING</div>
                </div>
            </div>
        </section>
    </div>

    <footer class="status-bar">
        <div class="status-left">
            <span class="status-dot"></span>
            <span class="status-text">SYSTEM READY</span>
        </div>
        <div class="status-right">
            <span class="energy-label">ENERGY:</span>
            <div class="energy-bar">
                <div class="energy-fill"></div>
            </div>
            <span class="energy-value">100%</span>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
