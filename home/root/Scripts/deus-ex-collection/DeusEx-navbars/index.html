<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deus Ex: Human Revolution - Navigation Systems</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="hex-bg"></div>
    <div class="vignette"></div>
    <div class="scanlines"></div>
        <section class="section">
            <div class="section-header">
                <div class="section-icon">◈</div>
                <h2 class="section-title">CURVED LEFT TILT</h2>
                <div class="section-line"></div>
            </div>
            <div class="demo-frame">
                <nav class="nav-curved-left">
                    <div class="edge-brand">
                        <span class="edge-icon">◈</span>
                        <span class="edge-text">ARCANGELO</span>
                    </div>
                    <div class="edge-links">
                        <a href="#" class="edge-link active">
                            <span class="link-line"></span>
                            <span class="link-text">HOME</span>
                        </a>
                        <a href="#" class="edge-link">
                            <span class="link-line"></span>
                            <span class="link-text">WORKS</span>
                        </a>
                        <a href="#" class="edge-link">
                            <span class="link-line"></span>
                            <span class="link-text">TECH</span>
                        </a>
                        <a href="#" class="edge-link">
                            <span class="link-line"></span>
                            <span class="link-text">CONTACT</span>
                        </a>
                    </div>
                    <div class="edge-status">
                        <div class="status-dot"></div>
                        <span>ONLINE</span>
                    </div>
                </nav>
            </div>
        </section>
        <section class="section">
            <div class="section-header">
                <div class="section-icon">◈</div>
                <h2 class="section-title">FISHEYE HUD</h2>
                <div class="section-line"></div>
            </div>
            <div class="demo-frame dark">
                <nav class="nav-fisheye">
                    <div class="fisheye-brand">
                        <span class="fisheye-icon">◈</span>
                        <span class="fisheye-text">SARIF INDUSTRIES</span>
                    </div>
                    <div class="fisheye-links">
                        <a href="#" class="fisheye-link active">
                            <span class="link-num">01</span>
                            <span>HOME</span>
                        </a>
                        <a href="#" class="fisheye-link">
                            <span class="link-num">02</span>
                            <span>WORKS</span>
                        </a>
                        <a href="#" class="fisheye-link">
                            <span class="link-num">03</span>
                            <span>TECH</span>
                        </a>
                        <a href="#" class="fisheye-link">
                            <span class="link-num">04</span>
                            <span>CONTACT</span>
                        </a>
                    </div>
                </nav>
            </div>
        </section>
